<div class="card">
    <div class="card-body">
        <h5 class="card-title"><span app-data-value="user.name"></span></h5>
        <p class="card-text">Offer skill <span app-data-value="skill.name"></span> with level <span app-data-value="level"></span></p>

            <a href="javascript:void(0)" class="btn btn-primary">Accept</a>
            <a href="javascript:void(0)" class="btn btn-secondary">Refuse</a>
        </div>
    </div>    
</div>
